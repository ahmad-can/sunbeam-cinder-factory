vendor: dellsc
display_name: Dell SC Series (Storage Center)
description: |
  Dell SC Series (Storage Center) integration for OpenStack Cinder.
  Manages Dell Storage Center arrays via DSM Data Collector or direct
  connection (SC OS 7.1.1+). Supports iSCSI and Fibre Channel protocols.

ha_enabled: true
unsupported_driver: true
remove_base_config:
  - driver-ssl-cert

charm:
  name: cinder-volume-dellsc
  summary: OpenStack volume service - Dell SC Series backend

type_overrides:
  - name: san-login
    type: secret
    secret_key: san-login
    required: true

  - name: san-password
    type: secret
    secret_key: san-password
    required: true

  - name: dell-sc-ssn
    type: required
    python_type: int

  - name: protocol
    type: literal
    values: [fc, iscsi]
    required: true

  - name: secondary-san-ip
    type: required_group
    group: secondary

  - name: secondary-san-login
    type: secret_group
    secret_key: secondary-san-login
    group: secondary

  - name: secondary-san-password
    type: secret_group
    secret_key: secondary-san-password
    group: secondary

config_options:
  - name: protocol
    default: fc
    description: "Protocol selector: iscsi (SCISCSIDriver) or fc (SCFCDriver)."
    required: true
    cli_prompt: true
    enum: [iscsi, fc]
    enum_class: Protocol

  - name: san-ip
    description: IP address of the DSM Data Collector or Storage Center.
    required: true
    cli_prompt: true
    validation: ip_address

  - name: san-login
    type: secret
    description: Username for the DSM or Storage Center login.
    required: true
    cli_prompt: true
    secret_key: san-login

  - name: san-password
    type: secret
    description: Password for the DSM or Storage Center login.
    required: true
    cli_prompt: true
    secret_key: san-password

  - name: dell-sc-ssn
    type: int
    description: Storage Center System Serial Number.
    required: true
    cli_prompt: true

  - name: dell-sc-api-port
    type: int
    default: 3033
    description: Dell Storage Manager API port number.

  - name: dell-sc-server-folder
    default: openstack
    description: Server folder on the Storage Center for new server definitions.

  - name: dell-sc-volume-folder
    default: openstack
    description: Volume folder on the Storage Center for created volumes.

  - name: dell-sc-verify-cert
    type: boolean
    default: false
    description: Enable HTTPS certificate verification for the Storage Center.

  - name: dell-server-os
    default: "Red Hat Linux 6.x"
    description: Server OS type for new server definitions on the Storage Center.

  - name: dell-api-async-rest-timeout
    type: int
    default: 15
    description: API timeout in seconds for asynchronous REST calls.

  - name: dell-api-sync-rest-timeout
    type: int
    default: 30
    description: API timeout in seconds for synchronous REST calls.

  - name: san-thin-provision
    type: boolean
    default: true
    description: Use thin provisioning for SAN volumes.

  - name: use-multipath-for-image-xfer
    type: boolean
    default: true
    description: Enable multipathing for image transfer operations.

  - name: secondary-san-ip
    description: IP address of a secondary DSM Data Collector for failover.
    validation: ip_address

  - name: secondary-san-login
    type: secret
    description: Username for the secondary DSM Data Collector.
    secret_key: secondary-san-login

  - name: secondary-san-password
    type: secret
    description: Password for the secondary DSM Data Collector.
    secret_key: secondary-san-password

  - name: secondary-sc-api-port
    type: int
    default: 3033
    description: API port for the secondary DSM Data Collector.

  - name: excluded-domain-ips
    description: Comma-separated iSCSI Fault Domain IPs to exclude.

  - name: included-domain-ips
    description: Comma-separated iSCSI Fault Domain IPs to include (whitelist).
