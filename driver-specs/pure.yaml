vendor: purestorage
display_name: Pure Storage FlashArray
description: |
  Pure Storage FlashArray integration for OpenStack Cinder.
  Provides high-performance all-flash storage with enterprise features
  including data reduction, replication, and snapshots.

ha_enabled: true

charm:
  name: cinder-volume-purestorage
  summary: OpenStack volume service - Pure Storage backend

type_overrides:
  - name: pure-api-token
    type: secret
    secret_key: token
    required: true

  - name: pure-host-personality
    type: enum
    enum_class: Personality

  - name: pure-nvme-transport
    type: enum
    enum_class: NvmeTransport

  - name: pure-iscsi-cidr
    type: ip_network

  - name: pure-iscsi-cidr-list
    type: ip_network_list

  - name: pure-nvme-cidr
    type: ip_network

  - name: pure-nvme-cidr-list
    type: ip_network_list

config_options:
  - name: protocol
    default: iscsi
    description: |
      Pure Storage protocol selector, determines driver class to use:
      iscsi - PureISCSIDriver, fc - PureFCDriver, nvme - PureNVMEDriver
    cli_prompt: true
    enum: [iscsi, fc, nvme]
    enum_class: Protocol

  - name: use-multipath-for-image-xfer
    type: boolean
    default: true
    description: Enable multipathing for image transfer operations.

  - name: pure-api-token
    type: secret
    description: REST API authorization token from the FlashArray.
    required: true
    cli_prompt: true
    secret_key: token

  - name: pure-automatic-max-oversubscription-ratio
    type: boolean
    default: true
    description: Automatically determine oversubscription ratio from data reduction values.

  - name: pure-eradicate-on-delete
    type: boolean
    default: false
    description: "Immediately eradicate volumes on delete (WARNING: not recoverable)."

  - name: pure-host-personality
    description: Host personality for protocol tuning (aix, esxi, hitachi-vsp, hpux, oracle-vm-server, solaris, vms).
    enum: [aix, esxi, hitachi-vsp, hpux, oracle-vm-server, solaris, vms]
    enum_class: Personality

  - name: pure-iscsi-cidr
    default: "0.0.0.0/0"
    description: CIDR of FlashArray iSCSI targets hosts can connect to.
    validation: ip_network

  - name: pure-iscsi-cidr-list
    description: Comma-separated CIDRs for iSCSI targets. Supersedes pure-iscsi-cidr.
    validation: ip_network_list

  - name: pure-nvme-cidr
    default: "0.0.0.0/0"
    description: CIDR of FlashArray NVMe targets hosts can connect to.
    validation: ip_network

  - name: pure-nvme-cidr-list
    description: Comma-separated CIDRs for NVMe targets. Supersedes pure-nvme-cidr.
    validation: ip_network_list

  - name: pure-nvme-transport
    default: tcp
    description: NVMe transport layer (tcp). Requires Purity 6.4.2+.
    enum: [tcp]
    enum_class: NvmeTransport

  - name: pure-replica-interval-default
    type: int
    default: 3600
    description: Snapshot replication interval in seconds.

  - name: pure-replica-retention-long-term-default
    type: int
    default: 7
    description: Retain snapshots per day on target for this many days.

  - name: pure-replica-retention-long-term-per-day-default
    type: int
    default: 3
    description: Number of snapshots to retain per day.

  - name: pure-replica-retention-short-term-default
    type: int
    default: 14400
    description: Retain all snapshots on target for this time (seconds).

  - name: pure-replication-pg-name
    default: cinder-group
    description: Protection Group name for async replication.

  - name: pure-replication-pod-name
    default: cinder-pod
    description: Pod name for sync replication.

  - name: pure-trisync-enabled
    type: boolean
    default: false
    description: Enable 3-site replication (sync + async).

  - name: pure-trisync-pg-name
    default: cinder-trisync
    description: Protection Group name for trisync replication.
