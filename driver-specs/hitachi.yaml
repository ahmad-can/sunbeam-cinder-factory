# Hitachi VSP Driver Specification
# Validation implementation for Sunbeam Cinder backend charm generation
#
# This spec defines BOTH the backend plugin (for CLI) AND the charm

vendor: hitachi
display_name: Hitachi Virtual Storage Platform
description: |
  Hitachi VSP (Virtual Storage Platform) integration for OpenStack Cinder.
  Provides enterprise-class storage with advanced data services including
  thin provisioning, snapshots, and replication.

# Supported storage protocols
protocols:
  - iscsi
  - fc

# High Availability support
ha_enabled: true

# Cinder driver class base path
driver_class_base: cinder.volume.drivers.hitachi.hbsd

# Protocol-specific driver classes
driver_classes:
  iscsi: HBSDISCSIDriver
  fc: HBSDFCDriver

# Charm metadata
charm:
  name: cinder-volume-hitachi
  summary: OpenStack volume service - Hitachi VSP backend
  base: ubuntu@24.04
  subordinate: true
  juju_requires: "3.3"

# Relations required by the charm
relations:
  requires:
    - name: cinder-volume
      interface: cinder-volume
      scope: container
      limit: 1
    - name: tracing
      interface: tracing
      optional: true
      limit: 1

# Vendor-specific configuration options
# Fields:
#   - cli_prompt: Show in CLI wizard (for backend.py)
#   - secret_key: Key inside the Juju secret dict
#   - validation: ip_network | ip_network_list | ip_address
#   - enum_class: Name for generated StrEnum class
config_options:
  # Common options
  - name: volume-backend-name
    type: string
    default: null
    description: |
      Name that Cinder will report for this backend. If unset the Juju
      application name is used.
    required: false
    cli_prompt: false

  - name: backend-availability-zone
    type: string
    default: null
    description: |
      Availability zone to associate with this backend.
    required: false
    cli_prompt: false

  - name: protocol
    type: string
    default: iscsi
    description: |
      Hitachi VSP protocol selector, determines driver class to use:
      iscsi - HBSDISCSIDriver (iSCSI)
      fc - HBSDFCDriver (Fibre Channel)
    required: false
    cli_prompt: true
    enum:
      - iscsi
      - fc
    enum_class: Protocol

  # Connection options - REQUIRED, shown in CLI
  - name: hitachi-storage-id
    type: string
    default: null
    description: |
      Hitachi VSP storage system serial number. This uniquely identifies
      the storage array for management operations.
    required: true
    cli_prompt: true

  - name: hitachi-storage-cli
    type: string
    default: /opt/horcm/bin/raidcom
    description: |
      Path to the Hitachi RAID command CLI tool (raidcom).
      This is used for all storage management operations.
    required: false
    cli_prompt: false

  - name: hitachi-horcm-user
    type: string
    default: null
    description: |
      Username for HORCM (Hitachi Open Remote Copy Manager) authentication.
    required: true
    cli_prompt: true

  - name: hitachi-horcm-password
    type: secret
    default: null
    description: |
      Password for HORCM authentication. Should be stored as a Juju secret.
    required: true
    cli_prompt: true
    secret_key: password

  - name: hitachi-rest-api-ip
    type: string
    default: null
    description: |
      IP address of the Hitachi Configuration Manager REST API server.
      Required for REST API-based management operations.
    required: false
    cli_prompt: true
    validation: ip_address

  - name: hitachi-rest-api-port
    type: int
    default: 443
    description: |
      Port number for the Hitachi Configuration Manager REST API.
    required: false
    cli_prompt: false

  # Pool configuration
  - name: hitachi-pool
    type: string
    default: null
    description: |
      Hitachi Dynamic Provisioning (DP) pool ID or name to use for
      volume provisioning. Multiple pools can be specified as a
      comma-separated list.
    required: true
    cli_prompt: true

  - name: hitachi-thin-pool
    type: string
    default: null
    description: |
      Hitachi thin provisioning pool for thin volumes. If not specified,
      hitachi-pool is used for thin provisioning.
    required: false
    cli_prompt: false

  - name: hitachi-snap-pool
    type: string
    default: null
    description: |
      Hitachi pool to use for snapshot volumes. If not specified,
      the same pool as the source volume is used.
    required: false
    cli_prompt: false

  # LDEV configuration
  - name: hitachi-ldev-range
    type: string
    default: null
    description: |
      Range of LDEVs (Logical Devices) that can be used for OpenStack.
      Format: "start-end" (e.g., "00:00:00-00:FF:FF").
      If not specified, any available LDEV can be used.
    required: false
    cli_prompt: false

  - name: hitachi-default-copy-method
    type: string
    default: FULL
    description: |
      Default copy method for volume operations.
      Options: FULL, THIN
    required: false
    cli_prompt: false
    enum:
      - FULL
      - THIN
    enum_class: CopyMethod

  # iSCSI-specific options
  - name: hitachi-target-ports
    type: string
    default: null
    description: |
      Comma-separated list of iSCSI target port IDs (e.g., "CL1-A,CL2-A").
      If not specified, all available ports are used.
    required: false
    cli_prompt: false
    protocol_specific: iscsi

  - name: hitachi-group-request
    type: boolean
    default: true
    description: |
      Enable host group creation for iSCSI initiator management.
    required: false
    cli_prompt: false
    protocol_specific: iscsi

  # FC-specific options
  - name: hitachi-zoning-request
    type: boolean
    default: true
    description: |
      Enable automatic zoning for Fibre Channel connections.
    required: false
    cli_prompt: false
    protocol_specific: fc

  - name: hitachi-fc-target-ports
    type: string
    default: null
    description: |
      Comma-separated list of FC target port IDs (e.g., "CL1-A,CL2-A").
      If not specified, all available ports are used.
    required: false
    cli_prompt: false
    protocol_specific: fc

  # Advanced options
  - name: hitachi-compute-target-ports
    type: string
    default: null
    description: |
      Target ports for compute node connections. Separate from
      controller ports for multipath optimization.
    required: false
    cli_prompt: false

  - name: hitachi-driver-ssl-cert-verify
    type: boolean
    default: true
    description: |
      Enable SSL certificate verification for REST API connections.
    required: false
    cli_prompt: false

  - name: hitachi-async-replication-enabled
    type: boolean
    default: false
    description: |
      Enable asynchronous replication support using Hitachi Universal
      Replicator (HUR).
    required: false
    cli_prompt: false

  - name: hitachi-replication-copy-pace
    type: int
    default: 3
    description: |
      Copy pace for replication operations (1-15). Higher values
      increase copy speed but may impact production I/O.
    required: false
    cli_prompt: false

# Feature flags for staged rollout
feature_flags:
  - name: enable_replication
    default: false
    description: Enable replication features (HUR)

  - name: enable_thin_provisioning
    default: true
    description: Enable thin provisioning by default

  - name: enable_rest_api
    default: true
    description: Use REST API instead of CLI for management

# Build requirements
build:
  packages:
    - git
    - libffi-dev
    - libssl-dev
    - pkg-config
    - rustc-1.80
    - cargo-1.80
  python_packages:
    - cryptography
    - jsonschema
    - pydantic
    - jinja2
  snaps:
    - astral-uv

# Python dependencies for the charm
dependencies:
  - cryptography
  - jinja2
  - pydantic
  - lightkube
  - lightkube-models
  - requests
  - ops
  - netifaces
  - tenacity
  - opentelemetry-api~=1.21.0
